# Sandbox pipeline: dump the runner environment for whichever event fired, so the
# GIT*/CI* values can be copied into contextinfo's test fixtures. It also prints a
# git-derived context block (commit subject, parent count / merge, committer) so
# we can compare what `git` itself reports across providers and events. Finally it
# downloads the latest released contextinfo binary and runs it, to show what the
# tool concludes from the same run.
#
# Trigger different scenarios to capture them:
#   - push to a branch -> gitlab_push_<branch>
#   - push a tag       -> gitlab_tag_<tag>   (CI_COMMIT_TAG set)
#   - "Run pipeline"   -> a web/manual pipeline
#   - open a merge request -> a merge_request_event pipeline (the rules below opt
#     in; without them GitLab only runs the branch pipeline, i.e. source=push)
#   - scheduled run    -> create a schedule in the UI (Build > Pipeline
#     schedules) with cron "0 0 * * 1" / UTC; this job runs on it automatically
#     (CI_PIPELINE_SOURCE=schedule). GitLab schedules can't be set in this file.
printenv:
  image: debian:stable-slim
  # First rule opts the job into merge-request pipelines; the second keeps it on
  # the usual branch/tag/schedule/web pipelines. With an open MR this can produce
  # both a branch and an MR pipeline — harmless for a diagnostic.
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE != "merge_request_event"
  # debian-slim has the cloned tree but no git binary; install git (for the git
  # block) plus curl + ca-certificates (to download the contextinfo release).
  before_script:
    - apt-get update -qq && apt-get install -y -qq git curl ca-certificates
  script:
    - echo "CI_PIPELINE_SOURCE = $CI_PIPELINE_SOURCE"
    - echo "CI_COMMIT_BRANCH   = $CI_COMMIT_BRANCH"
    - echo "CI_COMMIT_TAG      = $CI_COMMIT_TAG"
    - |
      echo "=== git context ==="
      echo "in_work_tree : $(git rev-parse --is-inside-work-tree 2>/dev/null || echo no)"
      echo "head_sha     : $(git rev-parse HEAD 2>/dev/null)"
      echo "branch_symref: $(git symbolic-ref --short HEAD 2>/dev/null || echo '(detached)')"
      echo "parents      : $(git show -s --format='%P' HEAD 2>/dev/null)"
      echo "parent_count : $(git show -s --format='%P' HEAD 2>/dev/null | wc -w)"
      echo "subject      : $(git log -1 --format='%s' 2>/dev/null)"
      echo "committer    : $(git log -1 --format='%cn <%ce>' 2>/dev/null)"
      echo "author       : $(git log -1 --format='%an <%ae>' 2>/dev/null)"
      echo "--- recent history (oneline) ---"
      git log --oneline --decorate -5 2>/dev/null || true
    - printenv | sort | grep -E '^(GIT|CI)' | grep -viE 'token|secret|password'
    - |
      echo "=== contextinfo (latest release) ==="
      # Resolve the latest tag (e.g. v0.4.0), then download the asset for this
      # platform. The tag keeps the "v"; the asset name drops it (0.4.0).
      TAG=$(curl -fsSL https://api.github.com/repos/Th0masL/contextinfo/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/') || true
      if [ -z "$TAG" ]; then
        echo "(could not resolve latest release — skipping)"
      else
        VER=${TAG#v}
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m); case "$ARCH" in x86_64) ARCH=amd64 ;; aarch64|arm64) ARCH=arm64 ;; esac
        mkdir -p tmp && curl -fsSL -o tmp/contextinfo "https://github.com/Th0masL/contextinfo/releases/download/${TAG}/contextinfo_${VER}_${OS}_${ARCH}"
        chmod +x tmp/contextinfo
        tmp/contextinfo --version
        tmp/contextinfo --format=text
      fi
